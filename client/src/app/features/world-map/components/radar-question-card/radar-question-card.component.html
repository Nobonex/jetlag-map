<app-question-card
  [question]="question"
  [index]="index"
  typeLabel="Radar"
  (toggleCollapsed)="onToggleCollapsed($event)"
  (toggleLocked)="onToggleLocked($event)"
  (deleteRequest)="onDeleteRequest($event)"
  (titleChange)="onTitleChange($event)"
>
  <div class="question-field">
    <span class="question-field-label">Answer</span>
    <nz-radio-group
      [ngModel]="question.draft.mode"
      (ngModelChange)="onDraftModeChange($event)"
      [nzDisabled]="question.isLocked"
    >
      <label nz-radio-button nzValue="inside">Inside</label>
      <label nz-radio-button nzValue="outside">Outside</label>
    </nz-radio-group>
  </div>

  <div class="question-field">
    <span class="question-field-label">Radius</span>
    <div class="question-size-row">
      <nz-input-number
        class="question-size-input"
        [ngModel]="question.draft.radiusKm"
        (ngModelChange)="onDraftRadiusChange($event)"
        [nzDisabled]="question.isLocked"
        [nzMin]="1"
        [nzMax]="5000"
        [nzStep]="5"
      ></nz-input-number>
      <span class="question-field-unit">km</span>
    </div>
  </div>

  @if (isDirty()) {
    <div class="question-apply-row">
      <button
        type="button"
        nz-button
        nzType="primary"
        nzSize="small"
        [disabled]="question.isLocked"
        (click)="onApply()"
      >
        Apply
      </button>
    </div>
  }

  @if (question.isLocked) {
    <p class="question-lock-note">
      Locked: inputs are disabled and the marker cannot be moved.
    </p>
  }
</app-question-card>
