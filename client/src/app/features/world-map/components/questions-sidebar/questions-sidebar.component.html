<div class="sidebar-heading">
  <span class="sidebar-kicker">Questions</span>
</div>

@if (questions.length > 0) {
  @for (question of questions; track question.id; let index = $index) {
    @switch (question.type) {
      @case ('radar') {
        <app-radar-question-card
          [question]="$any(question)"
          [index]="getTypeIndex($index)"
          (deleteRequest)="onDeleteRequest($event)"
        />
      }
      @case ('thermometer') {
        <app-thermometer-question-card
          [question]="$any(question)"
          [index]="getTypeIndex($index)"
          (deleteRequest)="onDeleteRequest($event)"
        />
      }
    }
  }
} @else {
  <div class="sidebar-section">
    <p class="sidebar-copy">
      No questions added yet. Use the map context menu to add one.
    </p>
  </div>
}
